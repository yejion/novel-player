name: Android CI & Release

on:
  push:
    branches: [ "main", "master" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build:
    name: Build & Sign APK
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Decode Debug Keystore
      run: |
        if [ -f "debug.keystore.base64" ]; then
          echo "Decoding debug keystore from base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ ! -f "debug.keystore" ]; then
          echo "Generating fallback debug keystore..."
          keytool -genkey -v -keystore debug.keystore -alias androiddebugkey -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US" -storepass android -keypass android
        fi

    - name: Prepare Release Keystore (Optional)
      env:
        RELEASE_KEYSTORE_BASE64: ${{ secrets.RELEASE_KEYSTORE_BASE64 }}
      run: |
        if [ ! -z "$RELEASE_KEYSTORE_BASE64" ]; then
          echo "Decoding release upload key from secrets..."
          echo "$RELEASE_KEYSTORE_BASE64" | base64 -d > my-upload-key.jks
          echo "HAS_RELEASE_SECRETS=true" >> $GITHUB_ENV
        else
          echo "No release keystore secret found, falling back to debug-only build."
          echo "HAS_RELEASE_SECRETS=false" >> $GITHUB_ENV
        fi

    - name: Build debug APK
      run: |
        if [ -f "./gradlew" ]; then
          chmod +x ./gradlew
          ./gradlew :app:assembleDebug
        else
          gradle :app:assembleDebug
        fi

    - name: Build release APK (If secrets configured)
      if: env.HAS_RELEASE_SECRETS == 'true'
      env:
        STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      run: |
        if [ -f "./gradlew" ]; then
          ./gradlew :app:assembleRelease
        else
          gradle :app:assembleRelease
        fi

    - name: Upload Debug APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: Audiobook-Debug-APK
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Upload Release APK Artifact (If available)
      if: env.HAS_RELEASE_SECRETS == 'true'
      uses: actions/upload-artifact@v4
      with:
        name: Audiobook-Release-APK
        path: app/build/outputs/apk/release/app-release.apk

    - name: Create GitHub Release (On Push of version tag)
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: |
          app/build/outputs/apk/debug/app-debug.apk
          app/build/outputs/apk/release/app-release.apk
        draft: false
        prerelease: false
        generate_release_notes: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
